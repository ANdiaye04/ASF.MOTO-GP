<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoGP - Accueil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1a1a1a;
            padding: 1rem 0;
            border-bottom: 2px solid #ff0000;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff0000;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }

        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: #ff0000;
        }

        main {
            margin-top: 80px;
            padding: 2rem 5%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        section img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
        }

        footer {
            background: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 1.5rem;
            border-top: 2px solid #ff0000;
            margin-top: auto;
        }

        footer p {
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                gap: 1rem;
            }

            nav ul {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }

            main {
                margin-top: 100px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.5rem;
            }

            nav ul li a {
                font-size: 0.9rem;
                padding: 0.4rem 0.8rem;
            }

            footer p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">MotoGP</div>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="index2.html">Le Sport</a></li>
                <li><a href="index3.html">Célébrités</a></li>
                <li><a href="index4.html">Compétitions</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <img src="image/MotoGP 2025 Logo png.jpg" alt="Logo MotoGP 2025" onerror="this.src='https://via.placeholder.com/800x400?text=MotoGP+2025+Logo'">
        </section>
    </main>

    <footer>
        <p>Tous droits réservés ©️ Projet LTI 2026. Créé par Coumba Seydi et Anta Ndiaye</p>
    </footer>
</body>
</html>
